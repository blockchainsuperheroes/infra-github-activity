name: Weekly Activity Report

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate reports
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node report.js

      - name: Copy org report to dashboard repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/blockchainsuperheroes/infra-activity-dashboard.git dashboard
          cp blockchainsuperheroes_contribution-report.html dashboard/
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update contribution report $(date +%Y-%m-%d)"
          git push

      - name: Commit reports to this repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update reports $(date +%Y-%m-%d)"
          git push
